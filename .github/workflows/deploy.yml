name: Deploy

on:
  push:
    branches: [main]

# Deny all permissions at workflow level; grant minimally per job.
permissions:
  contents: read

jobs:
  # Run the same lint and test gates as the PR workflow. A direct push to
  # main (bypassing a PR) should not skip these checks.
  lint-test:
    name: Lint and test
    uses: ./.github/workflows/_lint-test.yml
    permissions:
      contents: read

  apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs: lint-test
    # The environment declaration is the approval gate. GitHub pauses this
    # job until a required reviewer approves in the Actions UI. The approval
    # is recorded with the approver's identity and timestamp.
    #
    # To configure: Settings → Environments → production → Required reviewers.
    environment:
      name: production
      url: ${{ steps.endpoint.outputs.url }}
    permissions:
      contents: read
      id-token: write  # required to request the OIDC JWT
    defaults:
      run:
        working-directory: infra/
    outputs:
      api_endpoint: ${{ steps.endpoint.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54531c595c2c9b198e38e917af795ca8d41d  # v3.1.2
        with:
          terraform_version: "1.7.x"
          # Wrap terraform CLI calls so that outputs are accessible as step outputs.
          terraform_wrapper: true

      - name: Configure AWS credentials (deploy role)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          # Mask the assumed-role ARN from logs.
          mask-aws-account-id: true

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=terraform-state-lock" \
            -input=false

      # Re-plan at apply time rather than reusing the plan artifact from the
      # PR workflow. The PR plan may be minutes or hours old by the time a
      # reviewer approves; re-planning guarantees apply matches current state.
      - name: Terraform plan
        run: |
          terraform plan \
            -out=tfplan \
            -input=false \
            -no-color \
            -var="function_version=${{ github.sha }}"

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Capture API endpoint
        id: endpoint
        run: |
          url=$(terraform output -raw api_endpoint)
          echo "url=${url}" >> "$GITHUB_OUTPUT"

  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: apply
    permissions:
      contents: read
    env:
      API_URL: ${{ needs.apply.outputs.api_endpoint }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # Give API Gateway a moment after apply before hitting it. Lambda cold
      # starts on a brand-new function can take 2–3 seconds; 10s is
      # conservative and adds negligible pipeline time.
      - name: Wait for endpoint to become ready
        run: sleep 10

      - name: GET / — assert 200
        id: probe
        run: |
          response=$(curl \
            --silent \
            --show-error \
            --fail-with-body \
            --max-time 15 \
            --write-out "\n%{http_code}" \
            "${API_URL}/")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n -1)

          echo "HTTP status: ${http_code}"
          echo "Body: ${body}"
          echo "http_code=${http_code}" >> "$GITHUB_OUTPUT"
          echo "body=${body}"          >> "$GITHUB_OUTPUT"

          if [[ "${http_code}" != "200" ]]; then
            echo "Expected HTTP 200, got ${http_code}" >&2
            exit 1
          fi

      - name: Assert response is valid JSON
        run: |
          body='${{ steps.probe.outputs.body }}'
          echo "${body}" | jq empty || {
            echo "Response is not valid JSON" >&2
            exit 1
          }

      - name: Assert expected fields present
        run: |
          body='${{ steps.probe.outputs.body }}'
          for field in message path method version timestamp; do
            value=$(echo "${body}" | jq -r ".${field} // empty")
            if [[ -z "${value}" ]]; then
              echo "Missing or null field: ${field}" >&2
              exit 1
            fi
          done
          echo "All expected fields present"

      - name: Assert message is ok
        run: |
          body='${{ steps.probe.outputs.body }}'
          message=$(echo "${body}" | jq -r '.message')
          if [[ "${message}" != "ok" ]]; then
            echo "Expected message='ok', got '${message}'" >&2
            exit 1
          fi
          echo "Smoke test passed"

  notify:
    name: Notify
    runs-on: ubuntu-latest
    # Always run — we want a failure notification even when smoke-test fails.
    needs: [apply, smoke-test]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Determine deploy status
        id: status
        run: |
          apply_result="${{ needs.apply.result }}"
          smoke_result="${{ needs.smoke-test.result }}"

          if [[ "${apply_result}" == "success" && "${smoke_result}" == "success" ]]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "color=good"     >> "$GITHUB_OUTPUT"
            echo "icon=✅"        >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "color=danger"   >> "$GITHUB_OUTPUT"
            echo "icon=❌"        >> "$GITHUB_OUTPUT"
          fi

      # Posts a Slack-compatible webhook message. To wire to Slack:
      #   1. Create an incoming webhook: Slack → Apps → Incoming Webhooks → Add New
      #   2. Add the webhook URL as repository secret NOTIFY_WEBHOOK_URL
      #   3. That's it — the payload format is compatible with Slack out of the box.
      #
      # To wire to other systems (Teams, PagerDuty, generic HTTP):
      #   Adjust the JSON payload shape below to match the target API.
      - name: Post webhook notification
        env:
          WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          status="${{ steps.status.outputs.result }}"
          icon="${{ steps.status.outputs.icon }}"
          color="${{ steps.status.outputs.color }}"
          sha="${{ github.sha }}"
          short_sha="${sha:0:7}"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          actor="${{ github.actor }}"
          repo="${{ github.repository }}"

          payload=$(jq -n \
            --arg icon    "$icon" \
            --arg status  "$status" \
            --arg repo    "$repo" \
            --arg sha     "$short_sha" \
            --arg actor   "$actor" \
            --arg run_url "$run_url" \
            --arg color   "$color" \
            '{
              text: "\($icon) Deploy \($status) — \($repo)@\($sha)",
              attachments: [{
                color: $color,
                fields: [
                  { title: "Repository", value: $repo,    short: true },
                  { title: "Commit",     value: $sha,     short: true },
                  { title: "Triggered by", value: $actor, short: true },
                  { title: "Run",        value: $run_url, short: false }
                ]
              }]
            }')

          if [[ -z "${WEBHOOK_URL}" ]]; then
            echo "NOTIFY_WEBHOOK_URL is not set — skipping notification"
            echo "Payload that would have been sent:"
            echo "${payload}" | jq .
            exit 0
          fi

          http_code=$(curl \
            --silent \
            --output /dev/null \
            --write-out "%{http_code}" \
            --max-time 10 \
            --header "Content-Type: application/json" \
            --data "${payload}" \
            "${WEBHOOK_URL}")

          echo "Webhook response: ${http_code}"
          if [[ "${http_code}" != "200" ]]; then
            echo "Webhook POST failed with status ${http_code}" >&2
            exit 1
          fi
