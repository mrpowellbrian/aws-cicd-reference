name: Deploy

on:
  push:
    branches: [main]

# Deny all permissions at workflow level; grant minimally per job.
permissions:
  contents: read

jobs:
  # Run the same lint and test gates as the PR workflow. A direct push to
  # main (bypassing a PR) should not skip these checks.
  lint-test:
    name: Lint and test
    uses: ./.github/workflows/_lint-test.yml
    permissions:
      contents: read

  apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs: lint-test
    # The environment declaration is the approval gate. GitHub pauses this
    # job until a required reviewer approves in the Actions UI. The approval
    # is recorded with the approver's identity and timestamp.
    #
    # To configure: Settings → Environments → production → Required reviewers.
    environment:
      name: production
      url: ${{ steps.endpoint.outputs.url }}
    permissions:
      contents: read
      id-token: write  # required to request the OIDC JWT
    defaults:
      run:
        working-directory: infra/
    outputs:
      api_endpoint: ${{ steps.endpoint.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54531c595c2c9b198e38e917af795ca8d41d  # v3.1.2
        with:
          terraform_version: "1.7.x"
          # Wrap terraform CLI calls so that outputs are accessible as step outputs.
          terraform_wrapper: true

      - name: Configure AWS credentials (deploy role)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          # Mask the assumed-role ARN from logs.
          mask-aws-account-id: true

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=terraform-state-lock" \
            -input=false

      # Re-plan at apply time rather than reusing the plan artifact from the
      # PR workflow. The PR plan may be minutes or hours old by the time a
      # reviewer approves; re-planning guarantees apply matches current state.
      - name: Terraform plan
        run: |
          terraform plan \
            -out=tfplan \
            -input=false \
            -no-color \
            -var="function_version=${{ github.sha }}"

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Capture API endpoint
        id: endpoint
        run: |
          url=$(terraform output -raw api_endpoint)
          echo "url=${url}" >> "$GITHUB_OUTPUT"
