name: PR validation

on:
  pull_request:
    branches: [main]

# Deny all permissions at workflow level; grant minimally per job.
permissions:
  contents: read

jobs:
  lint-test:
    name: Lint and test
    uses: ./.github/workflows/_lint-test.yml
    permissions:
      contents: read

  security-scan:
    name: Security scan (Checkov)
    runs-on: ubuntu-latest
    # Run in parallel with lint-test — findings are independent of lint results.
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"

      - name: Install Checkov
        run: pip install --quiet checkov>=3.2,<4

      # Scan Terraform. checkov:skip annotations in .tf files handle known
      # intentional deviations (DLQ, VPC, code signing). Any unannotated
      # HIGH or CRITICAL finding blocks the PR.
      - name: Checkov — infra/
        run: |
          checkov \
            --directory infra/ \
            --framework terraform \
            --hard-fail-on HIGH,CRITICAL \
            --compact \
            --quiet

      # Scan GitHub Actions workflows. Catches misconfigured permissions,
      # unpinned actions, and dangerous workflow patterns (e.g. script
      # injection via PR title in run: steps).
      - name: Checkov — .github/workflows/
        run: |
          checkov \
            --directory .github/workflows/ \
            --framework github_actions \
            --hard-fail-on HIGH,CRITICAL \
            --compact \
            --quiet

  terraform-plan:
    name: Terraform plan
    runs-on: ubuntu-latest
    # Only plan when lint and security pass — no point planning broken code.
    needs: [lint-test, security-scan]
    permissions:
      contents: read
      id-token: write      # required to request the OIDC JWT
      pull-requests: write # required to post and update the plan comment
    defaults:
      run:
        working-directory: infra/

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54531c595c2c9b198e38e917af795ca8d41d  # v3.1.2
        with:
          terraform_version: "1.7.x"

      - name: Configure AWS credentials (plan role)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_PLAN_ROLE_ARN }}
          aws-region: us-east-1

      # Bucket and DynamoDB table created by scripts/bootstrap-oidc.sh.
      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=terraform-state-lock" \
            -input=false

      # -detailed-exitcode: exit 0 = no changes, exit 2 = changes, exit 1 = error.
      # Capturing separately from the run step lets us post the output as a
      # PR comment regardless of whether there are changes.
      - name: Terraform plan
        id: plan
        run: |
          terraform plan \
            -out=tfplan \
            -input=false \
            -no-color \
            -detailed-exitcode \
            -var="function_version=${{ github.sha }}" \
            2>&1 | tee plan.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Check plan exit code
        run: |
          code="${{ steps.plan.outputs.exit_code }}"
          if [[ "$code" == "1" ]]; then
            echo "terraform plan failed" >&2
            exit 1
          fi
          # exit 0 = no changes, exit 2 = changes pending — both are acceptable.

      # Post the plan output as a sticky PR comment. Uses actions/github-script
      # (first-party) rather than a third-party sticky-comment action to keep the
      # trust chain short. The script finds any previous plan comment from this
      # workflow and updates it rather than appending a new comment on each push.
      - name: Post plan as PR comment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan.txt', 'utf8');
            const maxLen = 60000;
            const truncated = plan.length > maxLen
              ? plan.slice(0, maxLen) + '\n\n... output truncated (plan exceeds comment limit)'
              : plan;

            const exitCode = '${{ steps.plan.outputs.exit_code }}';
            const status = exitCode === '0' ? '✓ No changes' : '⚠ Changes pending';
            const marker = '<!-- tf-plan-comment -->';

            const body = `${marker}
            ## Terraform plan — \`infra/\`

            **${status}** · commit \`${{ github.sha }}\` · [run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            <details><summary>Show plan output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`

            </details>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
