name: Lint and test (reusable)

# Reusable workflow — called by pr.yml and deploy.yml.
# Running the same gates in both workflows means a broken commit can never
# reach apply even if someone bypasses the PR requirement.

on:
  workflow_call:
    inputs:
      terraform_version:
        description: Terraform version to install.
        type: string
        default: "1.7.x"
      python_version:
        description: Python version to install.
        type: string
        default: "3.12"

# Minimum permissions. Callers may not grant more than this to the token
# passed into the reusable workflow.
permissions:
  contents: read

jobs:
  lint-terraform:
    name: Terraform fmt / validate / tflint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54531c595c2c9b198e38e917af795ca8d41d  # v3.1.2
        with:
          terraform_version: ${{ inputs.terraform_version }}

      # fmt runs from the repo root so it catches all .tf files recursively.
      - name: Terraform fmt check
        run: terraform fmt -check -recursive ..

      # -backend=false skips S3 initialisation — no AWS credentials needed
      # for syntax validation.
      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@19a52fbac37dacb22a09518e4ef6ee234f2d4987  # v4.0.0
        with:
          tflint_version: "v0.50.3"

      - name: tflint init
        run: tflint --init

      - name: tflint
        run: tflint --format compact

  lint-python:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test-python:
    name: Python unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest --tb=short -q
